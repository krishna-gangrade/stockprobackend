# ===== Server =====
server.port=8761
spring.application.name=eureka-server

# ===== Eureka Server Behaviour =====
# This IS the registry — it should NOT register with itself
eureka.client.register-with-eureka=false
eureka.client.fetch-registry=false

# Eureka server instance properties
eureka.instance.hostname=${EUREKA_HOSTNAME:localhost}

# Eureka server URL (self-reference for peer awareness)
eureka.client.service-url.defaultZone=http://${spring.security.user.name}:${spring.security.user.password}@${eureka.instance.hostname}:${server.port}/eureka

# Rename the dashboard title
eureka.server.wait-time-in-ms-when-sync-empty=0

# ===== Basic Auth Credentials =====
# All client services must include these in their eureka.client.serviceUrl.defaultZone
spring.security.user.name=eureka
spring.security.user.password=eureka-secret

# ===== Actuator =====
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
info.app.name=StockPro Eureka Server
info.app.version=1.0.0

# ===== Logging =====
logging.level.com.netflix.eureka=WARN
logging.level.com.netflix.discovery=WARN
