# ===== Server =====
server.port=8082
spring.application.name=api-gateway
stockpro.gateway.public-base-url=${GATEWAY_PUBLIC_BASE_URL:https://stockpro.linkpc.net}
stockpro.gateway.allowed-origins=${GATEWAY_ALLOWED_ORIGINS:http://localhost:4200,http://localhost:80,https://stockpro.linkpc.net,http://stockpro.linkpc.net}

# ===== Eureka Client =====
# Register this gateway with Eureka so Admin Server can monitor it
eureka.client.service-url.defaultZone=http://${EUREKA_USER:eureka}:${EUREKA_PASSWORD:eureka-secret}@${EUREKA_HOST:localhost}:${EUREKA_PORT:8761}/eureka
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.hostname=${EUREKA_INSTANCE_HOSTNAME:localhost}
eureka.instance.prefer-ip-address=${EUREKA_PREFER_IP:false}

# ===== JWT Secret (must match auth-service) =====
app.jwt.secret=${JWT_SECRET:stockpro-secret-key-must-be-at-least-256-bits-long-for-hs256}

# ===== Routes =====
# lb://SERVICE-NAME means: look up SERVICE-NAME in Eureka, then load-balance

# --- Route 1: /api/v1/auth/** → auth-service ---
spring.cloud.gateway.routes[0].id=auth-service
spring.cloud.gateway.routes[0].uri=lb://AUTH-SERVICE
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/v1/auth/**
spring.cloud.gateway.routes[0].filters[0]=JwtAuth
spring.cloud.gateway.routes[0].filters[1]=CircuitBreaker=name=authServiceCircuitBreaker,fallbackUri=forward:/fallback/auth-service

# --- Route 2: /api/v1/products/** → product-service ---
spring.cloud.gateway.routes[1].id=product-service
spring.cloud.gateway.routes[1].uri=lb://PRODUCT-SERVICE
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/v1/products/**
spring.cloud.gateway.routes[1].filters[0]=JwtAuth
spring.cloud.gateway.routes[1].filters[1]=CircuitBreaker=name=productServiceCircuitBreaker,fallbackUri=forward:/fallback/product-service

# --- Route 3: /api/v1/warehouses/** → warehouse-service ---
spring.cloud.gateway.routes[2].id=warehouse-service
spring.cloud.gateway.routes[2].uri=lb://WAREHOUSE-SERVICE
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/v1/warehouses/**
spring.cloud.gateway.routes[2].filters[0]=JwtAuth
spring.cloud.gateway.routes[2].filters[1]=CircuitBreaker=name=warehouseServiceCircuitBreaker,fallbackUri=forward:/fallback/warehouse-service

# --- Route 4: /api/v1/purchase-orders/** → purchase-service ---
spring.cloud.gateway.routes[3].id=purchase-service
spring.cloud.gateway.routes[3].uri=lb://PURCHASE-SERVICE
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/v1/purchase-orders/**
spring.cloud.gateway.routes[3].filters[0]=JwtAuth
spring.cloud.gateway.routes[3].filters[1]=CircuitBreaker=name=purchaseServiceCircuitBreaker,fallbackUri=forward:/fallback/purchase-service

# --- Route 5: /api/v1/movements/** → movement-service ---
spring.cloud.gateway.routes[4].id=movement-service
spring.cloud.gateway.routes[4].uri=lb://MOVEMENT-SERVICE
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/v1/movements/**
spring.cloud.gateway.routes[4].filters[0]=JwtAuth
spring.cloud.gateway.routes[4].filters[1]=CircuitBreaker=name=movementServiceCircuitBreaker,fallbackUri=forward:/fallback/movement-service

# --- Route 6: /api/v1/suppliers/** → supplier-service ---
spring.cloud.gateway.routes[5].id=supplier-service
spring.cloud.gateway.routes[5].uri=lb://SUPPLIER-SERVICE
spring.cloud.gateway.routes[5].predicates[0]=Path=/api/v1/suppliers/**
spring.cloud.gateway.routes[5].filters[0]=JwtAuth
spring.cloud.gateway.routes[5].filters[1]=CircuitBreaker=name=supplierServiceCircuitBreaker,fallbackUri=forward:/fallback/supplier-service

# --- Route 7: /api/v1/alerts/** → alert-service ---
spring.cloud.gateway.routes[6].id=alert-service
spring.cloud.gateway.routes[6].uri=lb://ALERT-SERVICE
spring.cloud.gateway.routes[6].predicates[0]=Path=/api/v1/alerts/**
spring.cloud.gateway.routes[6].filters[0]=JwtAuth
spring.cloud.gateway.routes[6].filters[1]=CircuitBreaker=name=alertServiceCircuitBreaker,fallbackUri=forward:/fallback/alert-service

# --- Route 8: /api/v1/reports/** → report-service ---
spring.cloud.gateway.routes[7].id=report-service
spring.cloud.gateway.routes[7].uri=lb://REPORT-SERVICE
spring.cloud.gateway.routes[7].predicates[0]=Path=/api/v1/reports/**
spring.cloud.gateway.routes[7].filters[0]=JwtAuth
spring.cloud.gateway.routes[7].filters[1]=CircuitBreaker=name=reportServiceCircuitBreaker,fallbackUri=forward:/fallback/report-service

# --- Route 9: Admin Server UI proxy ---
spring.cloud.gateway.routes[8].id=admin-server
spring.cloud.gateway.routes[8].uri=lb://ADMIN-SERVER
spring.cloud.gateway.routes[8].predicates[0]=Path=/admin/**
spring.cloud.gateway.routes[8].filters[0]=StripPrefix=1
spring.cloud.gateway.routes[8].filters[1]=CircuitBreaker=name=adminServerCircuitBreaker,fallbackUri=forward:/fallback/admin-server

# --- Route 10: /api/v1/payments/** -> payment-service ---
spring.cloud.gateway.routes[9].id=payment-service
spring.cloud.gateway.routes[9].uri=lb://PAYMENT-SERVICE
spring.cloud.gateway.routes[9].predicates[0]=Path=/api/v1/payments/**
spring.cloud.gateway.routes[9].filters[0]=JwtAuth
spring.cloud.gateway.routes[9].filters[1]=CircuitBreaker=name=paymentServiceCircuitBreaker,fallbackUri=forward:/fallback/payment-service

# --- Route 11+: Centralized Swagger/OpenAPI access through gateway ---
spring.cloud.gateway.routes[10].id=auth-docs
spring.cloud.gateway.routes[10].uri=lb://AUTH-SERVICE
spring.cloud.gateway.routes[10].predicates[0]=Path=/docs/auth/**
spring.cloud.gateway.routes[10].filters[0]=RewritePath=/docs/auth/(?<segment>.*), /api/v1/$\{segment}

spring.cloud.gateway.routes[11].id=product-docs
spring.cloud.gateway.routes[11].uri=lb://PRODUCT-SERVICE
spring.cloud.gateway.routes[11].predicates[0]=Path=/docs/products/**
spring.cloud.gateway.routes[11].filters[0]=RewritePath=/docs/products/(?<segment>.*), /api/v1/$\{segment}

spring.cloud.gateway.routes[12].id=warehouse-docs
spring.cloud.gateway.routes[12].uri=lb://WAREHOUSE-SERVICE
spring.cloud.gateway.routes[12].predicates[0]=Path=/docs/warehouses/**
spring.cloud.gateway.routes[12].filters[0]=RewritePath=/docs/warehouses/(?<segment>.*), /api/v1/$\{segment}

spring.cloud.gateway.routes[13].id=purchase-docs
spring.cloud.gateway.routes[13].uri=lb://PURCHASE-SERVICE
spring.cloud.gateway.routes[13].predicates[0]=Path=/docs/purchases/**
spring.cloud.gateway.routes[13].filters[0]=RewritePath=/docs/purchases/(?<segment>.*), /api/v1/$\{segment}

spring.cloud.gateway.routes[14].id=payment-docs
spring.cloud.gateway.routes[14].uri=lb://PAYMENT-SERVICE
spring.cloud.gateway.routes[14].predicates[0]=Path=/docs/payments/**
spring.cloud.gateway.routes[14].filters[0]=RewritePath=/docs/payments/(?<segment>.*), /api/v1/$\{segment}

spring.cloud.gateway.routes[15].id=supplier-docs
spring.cloud.gateway.routes[15].uri=lb://SUPPLIER-SERVICE
spring.cloud.gateway.routes[15].predicates[0]=Path=/docs/suppliers/**
spring.cloud.gateway.routes[15].filters[0]=RewritePath=/docs/suppliers/(?<segment>.*), /api/v1/$\{segment}

spring.cloud.gateway.routes[16].id=movement-docs
spring.cloud.gateway.routes[16].uri=lb://MOVEMENT-SERVICE
spring.cloud.gateway.routes[16].predicates[0]=Path=/docs/movements/**
spring.cloud.gateway.routes[16].filters[0]=RewritePath=/docs/movements/(?<segment>.*), /api/v1/$\{segment}

spring.cloud.gateway.routes[17].id=alert-docs
spring.cloud.gateway.routes[17].uri=lb://ALERT-SERVICE
spring.cloud.gateway.routes[17].predicates[0]=Path=/docs/alerts/**
spring.cloud.gateway.routes[17].filters[0]=RewritePath=/docs/alerts/(?<segment>.*), /api/v1/$\{segment}

spring.cloud.gateway.routes[18].id=report-docs
spring.cloud.gateway.routes[18].uri=lb://REPORT-SERVICE
spring.cloud.gateway.routes[18].predicates[0]=Path=/docs/reports/**
spring.cloud.gateway.routes[18].filters[0]=RewritePath=/docs/reports/(?<segment>.*), /api/v1/$\{segment}

# ===== Actuator =====
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always
management.endpoint.gateway.enabled=true
info.app.name=StockPro API Gateway
info.app.version=1.0.0

spring.cloud.loadbalancer.cache.enabled=true
spring.cloud.loadbalancer.cache.caffeine.spec=initialCapacity=8,maximumSize=128,expireAfterWrite=5m

resilience4j.circuitbreaker.configs.default.sliding-window-type=COUNT_BASED
resilience4j.circuitbreaker.configs.default.sliding-window-size=10
resilience4j.circuitbreaker.configs.default.minimum-number-of-calls=5
resilience4j.circuitbreaker.configs.default.failure-rate-threshold=50
resilience4j.circuitbreaker.configs.default.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.configs.default.permitted-number-of-calls-in-half-open-state=3
resilience4j.timelimiter.configs.default.timeout-duration=5s

springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.urls[0].name=Auth Service
springdoc.swagger-ui.urls[0].url=/docs/auth/v3/api-docs
springdoc.swagger-ui.urls[1].name=Product Service
springdoc.swagger-ui.urls[1].url=/docs/products/v3/api-docs
springdoc.swagger-ui.urls[2].name=Warehouse Service
springdoc.swagger-ui.urls[2].url=/docs/warehouses/v3/api-docs
springdoc.swagger-ui.urls[3].name=Purchase Service
springdoc.swagger-ui.urls[3].url=/docs/purchases/v3/api-docs
springdoc.swagger-ui.urls[4].name=Payment Service
springdoc.swagger-ui.urls[4].url=/docs/payments/v3/api-docs
springdoc.swagger-ui.urls[5].name=Supplier Service
springdoc.swagger-ui.urls[5].url=/docs/suppliers/v3/api-docs
springdoc.swagger-ui.urls[6].name=Movement Service
springdoc.swagger-ui.urls[6].url=/docs/movements/v3/api-docs
springdoc.swagger-ui.urls[7].name=Alert Service
springdoc.swagger-ui.urls[7].url=/docs/alerts/v3/api-docs
springdoc.swagger-ui.urls[8].name=Report Service
springdoc.swagger-ui.urls[8].url=/docs/reports/v3/api-docs

# ===== Logging =====
logging.level.org.springframework.cloud.gateway=INFO
logging.level.com.stockpro.gateway=INFO
