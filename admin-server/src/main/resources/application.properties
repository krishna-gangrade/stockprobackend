# ===== Server =====
server.port=9090
spring.application.name=admin-server

# ===== Eureka Client =====
# Discovers all services automatically — no manual client registration needed
eureka.client.service-url.defaultZone=http://${EUREKA_USER:eureka}:${EUREKA_PASSWORD:eureka-secret}@${EUREKA_HOST:localhost}:${EUREKA_PORT:8761}/eureka
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.hostname=${EUREKA_INSTANCE_HOSTNAME:localhost}
eureka.instance.prefer-ip-address=${EUREKA_PREFER_IP:false}

# ===== Admin Server UI Credentials =====
spring.security.user.name=${ADMIN_USER:admin}
spring.security.user.password=${ADMIN_PASSWORD:admin}

# ===== Actuator (expose all endpoints so Admin Server can read them) =====
# Each monitored service must also expose these in its own application.properties
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always
management.info.env.enabled=true
spring.thymeleaf.check-template-location=false
spring.cache.type=caffeine

# ===== App Info (shown in Admin Server dashboard) =====
info.app.name=StockPro Admin Server
info.app.version=1.0.0
info.app.description=Spring Boot Admin monitoring dashboard for StockPro

# ===== Mail Notifications (alerts when a service goes DOWN) =====
# Uncomment and configure for production email alerts
# spring.boot.admin.notify.mail.enabled=true
# spring.boot.admin.notify.mail.to=devops@stockpro.com
# spring.boot.admin.notify.mail.from=admin@stockpro.com
# spring.mail.host=smtp.gmail.com
# spring.mail.port=587
# spring.mail.username=your-email@gmail.com
# spring.mail.password=your-app-password

# ===== Logging =====
logging.level.com.stockpro.admin=INFO
logging.level.de.codecentric=WARN
logging.level.org.apache.tomcat.util.http.parser.Cookie=ERROR
