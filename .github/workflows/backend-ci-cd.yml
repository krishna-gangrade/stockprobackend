name: Backend CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: backend-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ci:
    name: Backend CI
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: 2003
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -uroot -p2003"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    env:
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_NAME: stockpro_auth
      DB_USER: stockpro
      DB_PASSWORD: stockpro_pass
      JWT_SECRET: stockpro-ci-secret-key-must-be-at-least-256-bits-long
      REDIS_HOST: 127.0.0.1
      REDIS_PORT: 6379
      EUREKA_HOST: 127.0.0.1
      EUREKA_PORT: 8761
      SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Make Maven wrapper executable
        run: chmod +x mvnw

      - name: Install MySQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y mysql-client

      - name: Initialize CI databases
        run: |
          mysql -h 127.0.0.1 -uroot -p2003 < init-db.sql

      - name: Run tests
        run: ./mvnw -B clean verify

      - name: Run SonarQube analysis
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && env.SONAR_HOST_URL != '' && env.SONAR_TOKEN != ''
        continue-on-error: true
        run: |
          if ! curl -fsS --max-time 15 "${SONAR_HOST_URL}/api/system/status" >/dev/null; then
            echo "SonarQube is unreachable from GitHub Actions. Skipping analysis."
            exit 0
          fi
          ./mvnw -B org.sonarsource.scanner.maven:sonar-maven-plugin:sonar -Dsonar.host.url="${SONAR_HOST_URL}" -Dsonar.token="${SONAR_TOKEN}"

  deploy:
    name: Backend Deploy
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script_stop: true
          script: |
            set -Eeuo pipefail
            export GH_PAT="${{ secrets.GH_PAT }}"
            export REPO_URL="https://x-access-token:${GH_PAT}@github.com/${{ github.repository }}.git"
            export APP_DIR="/opt/stockpro/backend"
            export COMPOSE_FILE="docker-compose.prod.yml"
            command -v git >/dev/null 2>&1
            command -v docker >/dev/null 2>&1
            command -v curl >/dev/null 2>&1

            mkdir -p "${APP_DIR}"

            if [ ! -d "${APP_DIR}/.git" ]; then
              git clone "${REPO_URL}" "${APP_DIR}"
            fi

            cd "${APP_DIR}"
            git remote set-url origin "${REPO_URL}"
            git fetch origin main
            git reset --hard origin/main
            git clean -fd -e .env

            if [ ! -f .env ]; then
              echo "Missing ${APP_DIR}/.env. Create it on EC2 before running deployment."
              exit 1
            fi

            docker compose -f "${COMPOSE_FILE}" config >/dev/null
            docker compose -f "${COMPOSE_FILE}" build --pull
            docker compose -f "${COMPOSE_FILE}" up -d --remove-orphans

            for url in "http://localhost:8761/actuator/health" "http://localhost:9090/actuator/health" "http://localhost:8082/actuator/health" "http://localhost:8083/api/v1/actuator/health"; do
              success=0
              for attempt in $(seq 1 60); do
                if curl -fsS "$url" >/dev/null 2>&1; then
                  success=1
                  break
                fi
                sleep 5
              done
              if [ "$success" -ne 1 ]; then
                echo "Timed out waiting for $url"
                docker compose -f "${COMPOSE_FILE}" ps || true
                docker logs --tail 200 stockpro-eureka || true
                docker logs --tail 200 stockpro-gateway || true
                docker logs --tail 200 stockpro-auth-service || true
                exit 1
              fi
            done

            if command -v caddy >/dev/null 2>&1; then
              echo "Checking host Caddy config for stockpro.linkpc.net"
              DOMAIN="stockpro.linkpc.net"
              CADDY_UPDATED=0
              for conf in /etc/caddy/Caddyfile /etc/caddy/*.conf /etc/caddy/sites/*; do
                [ -f "$conf" ] || continue
                if grep -q "$DOMAIN" "$conf"; then
                  echo "Normalizing Caddy upstreams in $conf"
                  sudo cp "$conf" "$conf.bak"
                  sudo sed -i -E 's#reverse_proxy[[:space:]]+(127\\.0\\.0\\.1|localhost):8082#reverse_proxy 127.0.0.1:8082#g' "$conf"
                  sudo sed -i -E 's#reverse_proxy[[:space:]]+(127\\.0\\.0\\.1|localhost):4200#reverse_proxy 127.0.0.1:4200#g' "$conf"
                  CADDY_UPDATED=1
                fi
              done

              if [ "$CADDY_UPDATED" -ne 1 ]; then
                echo "No stockpro.linkpc.net Caddy config found. Appending site block to /etc/caddy/Caddyfile"
                sudo sh -c "printf '\n%s {\n    encode gzip\n\n    handle /api/* {\n        reverse_proxy 127.0.0.1:8082\n    }\n\n    handle {\n        reverse_proxy 127.0.0.1:4200\n    }\n}\n' '$DOMAIN' >> /etc/caddy/Caddyfile"
              fi

              echo "Reloading Caddy with frontend on 4200 and API gateway on 8082"
              if ! sudo caddy validate --config /etc/caddy/Caddyfile; then
                echo "Caddy validation failed. Showing config for debugging."
                sudo cat /etc/caddy/Caddyfile || true
                exit 1
              fi
              if sudo systemctl reload caddy >/dev/null 2>&1; then
                :
              elif sudo service caddy reload >/dev/null 2>&1; then
                :
              elif sudo caddy reload --config /etc/caddy/Caddyfile >/dev/null 2>&1; then
                :
              else
                echo "Unable to reload Caddy automatically after updating config."
                exit 1
              fi
            fi

            echo "Public route spot checks"
            curl -kIs https://stockpro.linkpc.net/ || true
            curl -kIs https://stockpro.linkpc.net/api/v1/auth/login || true

            docker compose -f "${COMPOSE_FILE}" ps
