name: Backend CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  ci:
    name: Backend CI
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: 2003
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -uroot -p2003"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    env:
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_NAME: stockpro_auth
      DB_USER: root
      DB_PASSWORD: 2003
      JWT_SECRET: stockpro-ci-secret-key-must-be-at-least-256-bits-long
      REDIS_HOST: 127.0.0.1
      REDIS_PORT: 6379
      EUREKA_HOST: 127.0.0.1
      EUREKA_PORT: 8761
      SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Install MySQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y mysql-client

      - name: Create CI database
        run: |
          mysql -h 127.0.0.1 -uroot -p2003 -e "CREATE DATABASE IF NOT EXISTS stockpro_auth;"

      - name: Run tests
        run: ./mvnw -B clean verify

      - name: Run SonarQube analysis
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && secrets.SONAR_HOST_URL != '' && secrets.SONAR_TOKEN != ''
        run: ./mvnw -B org.sonarsource.scanner.maven:sonar-maven-plugin:sonar -Dsonar.host.url="${SONAR_HOST_URL}" -Dsonar.token="${SONAR_TOKEN}"

  deploy:
    name: Backend Deploy
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script_stop: true
          script: |
            set -e
            export GH_PAT="${{ secrets.GH_PAT }}"
            export REPO_URL="https://x-access-token:${GH_PAT}@github.com/${{ github.repository }}.git"
            export APP_DIR="/opt/stockpro/backend"

            mkdir -p "${APP_DIR}"

            if [ ! -d "${APP_DIR}/.git" ]; then
              git clone "${REPO_URL}" "${APP_DIR}"
            fi

            cd "${APP_DIR}"
            git remote set-url origin "${REPO_URL}"
            git fetch origin main
            git reset --hard origin/main
            git clean -fd -e .env

            docker compose -f docker-compose.prod.yml pull || true
            docker compose -f docker-compose.prod.yml up -d --build --remove-orphans

            for url in \
              "http://localhost:8761/actuator/health" \
              "http://localhost:9090/actuator/health" \
              "http://localhost:8082/actuator/health" \
              "http://localhost:8083/api/v1/actuator/health"
            do
              timeout 180 sh -c "until wget -qO- \"$url\" >/dev/null; do sleep 5; done"
            done
