spring:
  config:
    import: "optional:file:.env[.properties],optional:file:../.env[.properties]"
  application:
    name: auth-service

  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:stockpro_auth}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:2003}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        default_batch_fetch_size: 20

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    redis:
      repositories:
        enabled: false
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 2

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USER:}
    password: ${MAIL_PASS:}
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:true}
          starttls:
            enable: ${MAIL_SMTP_STARTTLS:true}

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:your-google-client-id}
            client-secret: ${GOOGLE_CLIENT_SECRET:}
            scope: openid,profile,email
            redirect-uri: "{baseUrl}/auth/google/callback"

server:
  port: ${SERVER_PORT:8083}
  servlet:
    context-path: /api/v1

springdoc:
  api-docs:
    path: /v3/api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    try-it-out-enabled: true
    operations-sorter: alpha
    tags-sorter: alpha
    display-request-duration: true
  show-actuator: false
  packages-to-scan: com.stockpro.auth

management:
  health:
    mail:
      enabled: false
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

app:
  jwt:
    secret: ${JWT_SECRET:}
    # JWT Expiry: 8 hours and 7 days in milliseconds
    access-token-expiry-ms: ${JWT_ACCESS_EXPIRY:28800000}
    refresh-token-expiry-ms: ${JWT_REFRESH_EXPIRY:604800000}
  redis:
    session-prefix: "stockpro:session:"
    refresh-token-prefix: "stockpro:refresh:"
    blacklist-prefix: "stockpro:blacklist:"
  bootstrap-admin:
    enabled: ${BOOTSTRAP_ADMIN_ENABLED:true}
    full-name: ${BOOTSTRAP_ADMIN_NAME:StockPro Admin}
    email: ${BOOTSTRAP_ADMIN_EMAIL:admin@stockpro.local}
    password: ${BOOTSTRAP_ADMIN_PASSWORD:}
  mail:
    from: ${MAIL_FROM:no-reply@example.com}
    dev-log-otp-on-failure: ${MAIL_DEV_LOG_OTP_ON_FAILURE:false}
  password-reset:
    otp-length: ${PASSWORD_RESET_OTP_LENGTH:6}
    otp-expiry-minutes: ${PASSWORD_RESET_OTP_EXPIRY_MINUTES:10}

logging:
  level:
    com.stockpro.auth: INFO
    org.springframework.security: WARN
    "org.springframework.context.support.PostProcessorRegistrationDelegate$BeanPostProcessorChecker": ERROR
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# Eureka â€“ register with service discovery so gateway can route to lb://auth-service
eureka:
  client:
    service-url:
      defaultZone: http://${EUREKA_USER:eureka}:${EUREKA_PASSWORD:eureka-secret}@${EUREKA_HOST:localhost}:${EUREKA_PORT:8761}/eureka
    fetch-registry: false    # auth-service doesn't need to discover other services (yet)
    register-with-eureka: true
  instance:
    hostname: ${EUREKA_INSTANCE_HOSTNAME:localhost}
    prefer-ip-address: ${EUREKA_PREFER_IP:false}
    lease-renewal-interval-in-seconds: 10
    health-check-url-path: /api/v1/actuator/health
    instance-id: ${spring.application.name}:${server.port}
