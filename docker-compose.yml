services:
  eureka-server:
    build:
      context: ./backend
      dockerfile: eureka-server/Dockerfile
    container_name: stockpro-eureka
    restart: unless-stopped
    environment:
      SERVER_PORT: 8761
      EUREKA_USER: ${EUREKA_USER}
      EUREKA_PASSWORD: ${EUREKA_PASSWORD}
      EUREKA_HOSTNAME: eureka-server
      JAVA_TOOL_OPTIONS: -Xmx384m -Xms192m
    ports:
      - "127.0.0.1:8761:8761"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- --user='${EUREKA_USER}' --password='${EUREKA_PASSWORD}' http://localhost:8761/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 30s
    networks:
      - stockpro-net

  admin-server:
    build:
      context: ./backend
      dockerfile: admin-server/Dockerfile
    container_name: stockpro-admin
    restart: unless-stopped
    depends_on:
      eureka-server:
        condition: service_healthy
    environment:
      SERVER_PORT: 9090
      ADMIN_USER: ${ADMIN_USER}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      EUREKA_HOST: eureka-server
      EUREKA_PORT: 8761
      EUREKA_USER: ${EUREKA_USER}
      EUREKA_PASSWORD: ${EUREKA_PASSWORD}
      JAVA_TOOL_OPTIONS: -Xmx256m -Xms128m
    ports:
      - "127.0.0.1:9090:9090"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9090/actuator/health || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 6
      start_period: 45s
    networks:
      - stockpro-net

  api-gateway:
    build:
      context: ./backend
      dockerfile: api-gateway/Dockerfile
    container_name: stockpro-gateway
    restart: unless-stopped
    depends_on:
      eureka-server:
        condition: service_healthy
    environment:
      SERVER_PORT: 8082
      GATEWAY_PUBLIC_BASE_URL: ${GATEWAY_PUBLIC_BASE_URL:-http://127.0.0.1:8080}
      EUREKA_HOST: eureka-server
      EUREKA_PORT: 8761
      EUREKA_USER: ${EUREKA_USER}
      EUREKA_PASSWORD: ${EUREKA_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JAVA_TOOL_OPTIONS: -Xmx384m -Xms192m
    ports:
      - "127.0.0.1:8082:8082"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8082/actuator/health || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 6
      start_period: 45s
    networks:
      - stockpro-net

  stockpro-db:
    image: mysql:8.0
    container_name: stockpro-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
    command: --default-authentication-plugin=mysql_native_password
    volumes:
      - db_data:/var/lib/mysql
      - ./backend/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    ports:
      - "127.0.0.1:3312:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD}"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 30s
    networks:
      - stockpro-net

  auth-redis:
    image: redis:7-alpine
    container_name: stockpro-auth-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - "127.0.0.1:6380:6379"
    volumes:
      - auth_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 15s
      timeout: 3s
      retries: 8
    networks:
      - stockpro-net

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: stockpro-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "127.0.0.1:2181:2181"
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 2181 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - stockpro-net

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: stockpro-kafka
    restart: unless-stopped
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://127.0.0.1:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    ports:
      - "127.0.0.1:29092:29092"
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 8
      start_period: 40s
    networks:
      - stockpro-net

  auth-service:
    build:
      context: ./backend
      dockerfile: auth-service/Dockerfile
    container_name: stockpro-auth-service
    restart: unless-stopped
    depends_on:
      stockpro-db:
        condition: service_healthy
      auth-redis:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    environment:
      SERVER_PORT: 8083
      DB_HOST: stockpro-db
      DB_PORT: 3306
      DB_NAME: stockpro_auth
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: auth-redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ACCESS_EXPIRY: ${JWT_ACCESS_EXPIRY}
      JWT_REFRESH_EXPIRY: ${JWT_REFRESH_EXPIRY}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      MAIL_HOST: ${MAIL_HOST}
      MAIL_PORT: ${MAIL_PORT}
      MAIL_USER: ${MAIL_USER}
      MAIL_PASS: ${MAIL_PASS}
      MAIL_FROM: ${MAIL_FROM}
      MAIL_SMTP_AUTH: ${MAIL_SMTP_AUTH}
      MAIL_SMTP_STARTTLS: ${MAIL_SMTP_STARTTLS}
      MAIL_DEV_LOG_OTP_ON_FAILURE: ${MAIL_DEV_LOG_OTP_ON_FAILURE}
      PASSWORD_RESET_OTP_LENGTH: ${PASSWORD_RESET_OTP_LENGTH}
      PASSWORD_RESET_OTP_EXPIRY_MINUTES: ${PASSWORD_RESET_OTP_EXPIRY_MINUTES}
      BOOTSTRAP_ADMIN_ENABLED: ${BOOTSTRAP_ADMIN_ENABLED}
      BOOTSTRAP_ADMIN_NAME: ${BOOTSTRAP_ADMIN_NAME}
      BOOTSTRAP_ADMIN_EMAIL: ${BOOTSTRAP_ADMIN_EMAIL}
      BOOTSTRAP_ADMIN_PASSWORD: ${BOOTSTRAP_ADMIN_PASSWORD}
      EUREKA_HOST: eureka-server
      EUREKA_PORT: 8761
      EUREKA_USER: ${EUREKA_USER}
      EUREKA_PASSWORD: ${EUREKA_PASSWORD}
      EUREKA_INSTANCE_HOSTNAME: auth-service
      JAVA_TOOL_OPTIONS: -Xmx256m -Xms128m -Dnetworkaddress.cache.ttl=30 -Dnetworkaddress.cache.negative.ttl=0
    networks:
      - stockpro-net

  supplier-service:
    build:
      context: ./backend
      dockerfile: supplier-service/Dockerfile
    container_name: stockpro-supplier-service
    restart: unless-stopped
    depends_on:
      stockpro-db:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    environment:
      SERVER_PORT: 8090
      DB_HOST: stockpro-db
      DB_PORT: 3306
      DB_NAME: stockpro_supplier
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      MAIL_HOST: ${MAIL_HOST}
      MAIL_PORT: ${MAIL_PORT}
      MAIL_USER: ${MAIL_USER}
      MAIL_PASS: ${MAIL_PASS}
      MAIL_FROM: ${MAIL_FROM}
      MAIL_SMTP_AUTH: ${MAIL_SMTP_AUTH}
      MAIL_SMTP_STARTTLS: ${MAIL_SMTP_STARTTLS}
      EUREKA_HOST: eureka-server
      EUREKA_PORT: 8761
      EUREKA_USER: ${EUREKA_USER}
      EUREKA_PASSWORD: ${EUREKA_PASSWORD}
      EUREKA_INSTANCE_HOSTNAME: supplier-service
      JAVA_TOOL_OPTIONS: -Xmx256m -Xms128m -Dnetworkaddress.cache.ttl=30 -Dnetworkaddress.cache.negative.ttl=0
    networks:
      - stockpro-net

  product-service:
    build:
      context: ./backend
      dockerfile: product-service/Dockerfile
    container_name: stockpro-product-service
    restart: unless-stopped
    depends_on:
      stockpro-db:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    environment:
      SERVER_PORT: 8085
      DB_HOST: stockpro-db
      DB_PORT: 3306
      DB_NAME: stockpro_product
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      EUREKA_HOST: eureka-server
      EUREKA_PORT: 8761
      EUREKA_USER: ${EUREKA_USER}
      EUREKA_PASSWORD: ${EUREKA_PASSWORD}
      EUREKA_INSTANCE_HOSTNAME: product-service
      JAVA_TOOL_OPTIONS: -Xmx256m -Xms128m -Dnetworkaddress.cache.ttl=30 -Dnetworkaddress.cache.negative.ttl=0
    networks:
      - stockpro-net

  warehouse-service:
    build:
      context: ./backend
      dockerfile: warehouse-service/Dockerfile
    container_name: stockpro-warehouse-service
    restart: unless-stopped
    depends_on:
      stockpro-db:
        condition: service_healthy
      kafka:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    environment:
      SERVER_PORT: 8084
      DB_HOST: stockpro-db
      DB_PORT: 3306
      DB_NAME: stockpro_warehouse
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      EUREKA_HOST: eureka-server
      EUREKA_PORT: 8761
      EUREKA_USER: ${EUREKA_USER}
      EUREKA_PASSWORD: ${EUREKA_PASSWORD}
      EUREKA_INSTANCE_HOSTNAME: warehouse-service
      JAVA_TOOL_OPTIONS: -Xmx256m -Xms128m -Dnetworkaddress.cache.ttl=30 -Dnetworkaddress.cache.negative.ttl=0
    networks:
      - stockpro-net

  purchase-service:
    build:
      context: ./backend
      dockerfile: purchase-service/Dockerfile
    container_name: stockpro-purchase-service
    restart: unless-stopped
    depends_on:
      stockpro-db:
        condition: service_healthy
      kafka:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    environment:
      SERVER_PORT: 8086
      DB_HOST: stockpro-db
      DB_PORT: 3306
      DB_NAME: stockpro_purchase
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      EUREKA_HOST: eureka-server
      EUREKA_PORT: 8761
      EUREKA_USER: ${EUREKA_USER}
      EUREKA_PASSWORD: ${EUREKA_PASSWORD}
      EUREKA_INSTANCE_HOSTNAME: purchase-service
      JAVA_TOOL_OPTIONS: -Xmx256m -Xms128m -Dnetworkaddress.cache.ttl=30 -Dnetworkaddress.cache.negative.ttl=0
    networks:
      - stockpro-net

  payment-service:
    build:
      context: ./backend
      dockerfile: payment-service/Dockerfile
    container_name: stockpro-payment-service
    restart: unless-stopped
    depends_on:
      stockpro-db:
        condition: service_healthy
      kafka:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    environment:
      SERVER_PORT: 8089
      DB_HOST: stockpro-db
      DB_PORT: 3306
      DB_NAME: stockpro_payment
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      PAYMENT_KAFKA_ENABLED: ${PAYMENT_KAFKA_ENABLED}
      PAYMENT_MOCK_ENABLED: ${PAYMENT_MOCK_ENABLED}
      PAYMENT_DUPLICATE_CLEANUP_ENABLED: ${PAYMENT_DUPLICATE_CLEANUP_ENABLED:-true}
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET}
      EUREKA_HOST: eureka-server
      EUREKA_PORT: 8761
      EUREKA_USER: ${EUREKA_USER}
      EUREKA_PASSWORD: ${EUREKA_PASSWORD}
      EUREKA_INSTANCE_HOSTNAME: payment-service
      JAVA_TOOL_OPTIONS: -Xmx256m -Xms128m -Dnetworkaddress.cache.ttl=30 -Dnetworkaddress.cache.negative.ttl=0
    networks:
      - stockpro-net

  alert-service:
    build:
      context: ./backend
      dockerfile: alert-service/Dockerfile
    container_name: stockpro-alert-service
    restart: unless-stopped
    depends_on:
      stockpro-db:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    environment:
      SERVER_PORT: 8087
      DB_HOST: stockpro-db
      DB_PORT: 3306
      DB_NAME: stockpro_alert
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      MAIL_HOST: ${MAIL_HOST}
      MAIL_PORT: ${MAIL_PORT}
      MAIL_USER: ${MAIL_USER}
      MAIL_PASS: ${MAIL_PASS}
      MAIL_SMTP_AUTH: ${MAIL_SMTP_AUTH}
      MAIL_SMTP_STARTTLS: ${MAIL_SMTP_STARTTLS}
      EUREKA_HOST: eureka-server
      EUREKA_PORT: 8761
      EUREKA_USER: ${EUREKA_USER}
      EUREKA_PASSWORD: ${EUREKA_PASSWORD}
      EUREKA_INSTANCE_HOSTNAME: alert-service
      JAVA_TOOL_OPTIONS: -Xmx256m -Xms128m -Dnetworkaddress.cache.ttl=30 -Dnetworkaddress.cache.negative.ttl=0
    networks:
      - stockpro-net

  movement-service:
    build:
      context: ./backend
      dockerfile: movement-service/Dockerfile
    container_name: stockpro-movement-service
    restart: unless-stopped
    depends_on:
      stockpro-db:
        condition: service_healthy
      kafka:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    environment:
      SERVER_PORT: 8088
      DB_HOST: stockpro-db
      DB_PORT: 3306
      DB_NAME: stockpro_movement
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      KAFKA_HOST: kafka
      KAFKA_PORT: 9092
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      EUREKA_HOST: eureka-server
      EUREKA_PORT: 8761
      EUREKA_USER: ${EUREKA_USER}
      EUREKA_PASSWORD: ${EUREKA_PASSWORD}
      EUREKA_INSTANCE_HOSTNAME: movement-service
      JAVA_TOOL_OPTIONS: -Xmx256m -Xms128m -Dnetworkaddress.cache.ttl=30 -Dnetworkaddress.cache.negative.ttl=0
    networks:
      - stockpro-net

  report-service:
    build:
      context: ./backend
      dockerfile: report-service/Dockerfile
    container_name: stockpro-report-service
    restart: unless-stopped
    depends_on:
      stockpro-db:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    environment:
      SERVER_PORT: 8091
      DB_HOST: stockpro-db
      DB_PORT: 3306
      DB_NAME: stockpro_report
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      EUREKA_HOST: eureka-server
      EUREKA_PORT: 8761
      EUREKA_USER: ${EUREKA_USER}
      EUREKA_PASSWORD: ${EUREKA_PASSWORD}
      EUREKA_INSTANCE_HOSTNAME: report-service
      JAVA_TOOL_OPTIONS: -Xmx256m -Xms128m -Dnetworkaddress.cache.ttl=30 -Dnetworkaddress.cache.negative.ttl=0
    networks:
      - stockpro-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: stockpro-frontend
    restart: unless-stopped
    depends_on:
      api-gateway:
        condition: service_started
    ports:
      - "127.0.0.1:8080:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/ || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - stockpro-net

volumes:
  db_data:
  auth_redis_data:

networks:
  stockpro-net:
    name: stockpro-net
    driver: bridge
