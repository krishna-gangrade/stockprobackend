name: stockpro

services:

  # ── Eureka Service Discovery ──────────────────────────────────────────────────
  eureka-server:
    build:
      context: .
      dockerfile: eureka-server/Dockerfile
    container_name: stockpro-eureka
    restart: unless-stopped
    environment:
      SERVER_PORT: 8761
      EUREKA_USER: eureka
      EUREKA_PASSWORD: eureka-secret
      EUREKA_HOSTNAME: eureka-server
      JAVA_TOOL_OPTIONS: "-Xmx384m -Xms192m"
    ports:
      - "8761:8761"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- --header='Authorization: Basic ZXVyZWthOmV1cmVrYS1zZWNyZXQ=' http://localhost:8761/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 512M

  # ── Spring Boot Admin Server ──────────────────────────────────────────────────
  admin-server:
    build:
      context: .
      dockerfile: admin-server/Dockerfile
    container_name: stockpro-admin
    restart: unless-stopped
    depends_on:
      eureka-server:
        condition: service_healthy
    environment:
      SERVER_PORT: 9090
      ADMIN_USER: admin
      ADMIN_PASSWORD: admin-secret
      EUREKA_HOST: eureka-server
      EUREKA_PORT: 8761
      EUREKA_USER: eureka
      EUREKA_PASSWORD: eureka-secret
      JAVA_TOOL_OPTIONS: "-Xmx256m -Xms128m"
    ports:
      - "9090:9090"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9090/actuator/health || exit 1"]
      interval: 20s
      timeout: 5s
      start_period: 40s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 384M

  # ── API Gateway ───────────────────────────────────────────────────────────────
  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    container_name: stockpro-gateway
    restart: unless-stopped
    depends_on:
      eureka-server:
        condition: service_healthy
    environment:
      SERVER_PORT: 8082
      EUREKA_HOST: eureka-server
      EUREKA_PORT: 8761
      EUREKA_USER: eureka
      EUREKA_PASSWORD: eureka-secret
      JWT_SECRET: "stockpro-secret-key-must-be-at-least-256-bits-long-for-hs256"
      JAVA_TOOL_OPTIONS: "-Xmx384m -Xms192m"
    ports:
      - "8082:8082"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8082/actuator/health || exit 1"]
      interval: 20s
      timeout: 5s
      start_period: 40s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M

  # ── Databases ─────────────────────────────────────────────────────────────────
  # ── Shared Database (Combined to save RAM) ──────────────────────────────────────
  stockpro-db:
    image: mysql:8.0
    container_name: stockpro-db
    environment:
      MYSQL_ROOT_PASSWORD: root_pass
    volumes:
      - db_data:/var/lib/mysql
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    ports:
      - "3312:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot_pass"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M

  # ── Infrastructure ─────────────────────────────────────────────────────────────
  auth-redis:
    image: redis:7-alpine
    container_name: stockpro-auth-redis
    command: redis-server --requirepass redis_pass
    ports:
      - "6380:6379"
    volumes:
      - auth_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "redis_pass", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 128M

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: stockpro-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 2181 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 256M

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: stockpro-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    ports:
      - "9092:9092"
      - "29092:29092"
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 768M

  # ── Microservices ─────────────────────────────────────────────────────────────
  auth-service:
    build:
      context: .
      dockerfile: auth-service/Dockerfile
    container_name: stockpro-auth-service
    depends_on:
      stockpro-db:
        condition: service_healthy
      auth-redis:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    environment:
      DB_HOST: stockpro-db
      DB_NAME: stockpro_auth
      DB_USER: stockpro
      DB_PASSWORD: stockpro_pass
      REDIS_HOST: auth-redis
      REDIS_PASSWORD: redis_pass
      JWT_SECRET: "stockpro-secret-key-must-be-at-least-256-bits-long-for-hs256"
      MAIL_HOST: ${MAIL_HOST}
      MAIL_PORT: ${MAIL_PORT}
      MAIL_USER: ${MAIL_USER}
      MAIL_PASS: ${MAIL_PASS}
      MAIL_FROM: ${MAIL_FROM}
      MAIL_SMTP_AUTH: ${MAIL_SMTP_AUTH}
      MAIL_SMTP_STARTTLS: ${MAIL_SMTP_STARTTLS}
      MAIL_DEV_LOG_OTP_ON_FAILURE: ${MAIL_DEV_LOG_OTP_ON_FAILURE:-false}
      PASSWORD_RESET_OTP_LENGTH: ${PASSWORD_RESET_OTP_LENGTH:-6}
      PASSWORD_RESET_OTP_EXPIRY_MINUTES: ${PASSWORD_RESET_OTP_EXPIRY_MINUTES:-10}
      BOOTSTRAP_ADMIN_ENABLED: ${BOOTSTRAP_ADMIN_ENABLED:-true}
      BOOTSTRAP_ADMIN_NAME: ${BOOTSTRAP_ADMIN_NAME:-StockPro Admin}
      BOOTSTRAP_ADMIN_EMAIL: ${BOOTSTRAP_ADMIN_EMAIL:-admin@stockpro.local}
      BOOTSTRAP_ADMIN_PASSWORD: ${BOOTSTRAP_ADMIN_PASSWORD:-Admin@123}
      EUREKA_HOST: eureka-server
      JAVA_TOOL_OPTIONS: "-Xmx256m -Xms128m -Dnetworkaddress.cache.ttl=30 -Dnetworkaddress.cache.negative.ttl=0"
    deploy:
      resources:
        limits:
          memory: 384M
    ports:
      - "8083:8083"

  supplier-service:
    build:
      context: .
      dockerfile: supplier-service/Dockerfile
    container_name: stockpro-supplier-service
    depends_on:
      stockpro-db:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    environment:
      SERVER_PORT: 8090
      DB_HOST: stockpro-db
      DB_NAME: stockpro_supplier
      DB_USER: stockpro
      DB_PASSWORD: stockpro_pass
      EUREKA_HOST: eureka-server
      MAIL_HOST: ${MAIL_HOST}
      MAIL_PORT: ${MAIL_PORT}
      MAIL_USER: ${MAIL_USER}
      MAIL_PASS: ${MAIL_PASS}
      MAIL_FROM: ${MAIL_FROM}
      MAIL_SMTP_AUTH: ${MAIL_SMTP_AUTH}
      MAIL_SMTP_STARTTLS: ${MAIL_SMTP_STARTTLS}
      JAVA_TOOL_OPTIONS: "-Xmx256m -Xms128m -Dnetworkaddress.cache.ttl=30 -Dnetworkaddress.cache.negative.ttl=0"
    deploy:
      resources:
        limits:
          memory: 384M
    ports:
      - "8090:8090"

  product-service:
    build:
      context: .
      dockerfile: product-service/Dockerfile
    container_name: stockpro-product-service
    depends_on:
      stockpro-db:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    environment:
      DB_HOST: stockpro-db
      DB_NAME: stockpro_product
      DB_USER: stockpro
      DB_PASSWORD: stockpro_pass
      EUREKA_HOST: eureka-server
      JAVA_TOOL_OPTIONS: "-Xmx256m -Xms128m -Dnetworkaddress.cache.ttl=30 -Dnetworkaddress.cache.negative.ttl=0"
    deploy:
      resources:
        limits:
          memory: 384M
    ports:
      - "8085:8085"

  warehouse-service:
    build:
      context: .
      dockerfile: warehouse-service/Dockerfile
    container_name: stockpro-warehouse-service
    depends_on:
      stockpro-db:
        condition: service_healthy
      kafka:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    environment:
      DB_HOST: stockpro-db
      DB_NAME: stockpro_warehouse
      DB_USER: stockpro
      DB_PASSWORD: stockpro_pass
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      EUREKA_HOST: eureka-server
      JAVA_TOOL_OPTIONS: "-Xmx256m -Xms128m -Dnetworkaddress.cache.ttl=30 -Dnetworkaddress.cache.negative.ttl=0"
    deploy:
      resources:
        limits:
          memory: 384M
    ports:
      - "8084:8084"

  purchase-service:
    build:
      context: .
      dockerfile: purchase-service/Dockerfile
    container_name: stockpro-purchase-service
    depends_on:
      stockpro-db:
        condition: service_healthy
      kafka:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    environment:
      DB_HOST: stockpro-db
      DB_NAME: stockpro_purchase
      DB_USER: stockpro
      DB_PASSWORD: stockpro_pass
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      EUREKA_HOST: eureka-server
      JAVA_TOOL_OPTIONS: "-Xmx256m -Xms128m -Dnetworkaddress.cache.ttl=30 -Dnetworkaddress.cache.negative.ttl=0"
    deploy:
      resources:
        limits:
          memory: 384M
    ports:
      - "8086:8086"

  payment-service:
    build:
      context: .
      dockerfile: payment-service/Dockerfile
    container_name: stockpro-payment-service
    depends_on:
      stockpro-db:
        condition: service_healthy
      kafka:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    environment:
      SERVER_PORT: 8089
      DB_HOST: stockpro-db
      DB_NAME: stockpro_payment
      DB_USER: stockpro
      DB_PASSWORD: stockpro_pass
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      PAYMENT_KAFKA_ENABLED: "true"
      EUREKA_HOST: eureka-server
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID:-rzp_test_placeholder}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET:-rzp_test_secret_placeholder}
      PAYMENT_MOCK_ENABLED: ${PAYMENT_MOCK_ENABLED:-true}
      JAVA_TOOL_OPTIONS: "-Xmx256m -Xms128m -Dnetworkaddress.cache.ttl=30 -Dnetworkaddress.cache.negative.ttl=0"
    deploy:
      resources:
        limits:
          memory: 384M
    ports:
      - "8089:8089"

  alert-service:
    build:
      context: .
      dockerfile: alert-service/Dockerfile
    container_name: stockpro-alert-service
    depends_on:
      stockpro-db:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    environment:
      SERVER_PORT: 8087
      DB_HOST: stockpro-db
      DB_NAME: stockpro_alert
      DB_USER: stockpro
      DB_PASSWORD: stockpro_pass
      MAIL_HOST: ${MAIL_HOST}
      MAIL_PORT: ${MAIL_PORT}
      MAIL_USER: ${MAIL_USER}
      MAIL_PASS: ${MAIL_PASS}
      MAIL_SMTP_AUTH: ${MAIL_SMTP_AUTH}
      MAIL_SMTP_STARTTLS: ${MAIL_SMTP_STARTTLS}
      EUREKA_HOST: eureka-server
      JAVA_TOOL_OPTIONS: "-Xmx256m -Xms128m -Dnetworkaddress.cache.ttl=30 -Dnetworkaddress.cache.negative.ttl=0"
    deploy:
      resources:
        limits:
          memory: 384M
    ports:
      - "8087:8087"

  movement-service:
    build:
      context: .
      dockerfile: movement-service/Dockerfile
    container_name: stockpro-movement-service
    depends_on:
      stockpro-db:
        condition: service_healthy
      kafka:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    environment:
      SERVER_PORT: 8088
      DB_HOST: stockpro-db
      DB_NAME: stockpro_movement
      DB_USER: stockpro
      DB_PASSWORD: stockpro_pass
      KAFKA_HOST: kafka
      KAFKA_PORT: 9092
      EUREKA_HOST: eureka-server
      JAVA_TOOL_OPTIONS: "-Xmx256m -Xms128m -Dnetworkaddress.cache.ttl=30 -Dnetworkaddress.cache.negative.ttl=0"
    deploy:
      resources:
        limits:
          memory: 384M
    ports:
      - "8088:8088"

  report-service:
    build:
      context: .
      dockerfile: report-service/Dockerfile
    container_name: stockpro-report-service
    depends_on:
      stockpro-db:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    environment:
      SERVER_PORT: 8091
      DB_HOST: stockpro-db
      DB_NAME: stockpro_report
      DB_USER: stockpro
      DB_PASSWORD: stockpro_pass
      EUREKA_HOST: eureka-server
      JAVA_TOOL_OPTIONS: "-Xmx256m -Xms128m -Dnetworkaddress.cache.ttl=30 -Dnetworkaddress.cache.negative.ttl=0"
    deploy:
      resources:
        limits:
          memory: 384M
    ports:
      - "8091:8091"

  stockpro-frontend:
    build:
      context: ../stockprofrontend
      dockerfile: Dockerfile
    container_name: stockpro-frontend
    depends_on:
      api-gateway:
        condition: service_started
    ports:
      - "4200:80"
    deploy:
      resources:
        limits:
          memory: 128M

volumes:
  db_data:
  auth_redis_data:

networks:
  default:
    name: stockpro-network
    driver: bridge
